<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KirinNet — 收录记录</title>
  <style>
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
      --accent: #f59e0b; --text: #e2e8f0; --text-muted: #94a3b8;
      --green: #10b981; --red: #f87171; --blue: #60a5fa;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }
    header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 16px 24px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 20px; color: var(--accent); }
    header nav a { color: var(--text-muted); text-decoration: none; font-size: 14px; margin-left: 16px; }
    header nav a:hover, header nav a.active { color: var(--accent); }

    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    /* Stats cards */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; text-align: center;
    }
    .stat-card .value { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-card .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* Log table */
    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th {
      text-align: left; font-size: 12px; color: var(--text-muted);
      padding: 10px 12px; border-bottom: 1px solid var(--border);
    }
    .log-table td {
      padding: 10px 12px; font-size: 13px;
      border-bottom: 1px solid rgba(42,45,58,0.5);
    }
    .log-table tr:hover td { background: rgba(245,158,11,0.04); }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge.indexed { background: #1e3a1e; color: var(--green); }
    .badge.updated { background: #1e3a5f; color: var(--blue); }
    .badge.de_indexed { background: #3a1e1e; color: var(--red); }
    .badge.re_indexed { background: #0f3a2e; color: #34d399; }

    /* Filter bar */
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
    }
    .filter-bar select, .filter-bar input {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 12px; color: var(--text); font-size: 13px;
    }
    .filter-bar button {
      background: var(--accent); color: #000; border: none; border-radius: 6px;
      padding: 6px 16px; font-weight: 600; cursor: pointer; font-size: 13px;
    }

    .empty { text-align: center; padding: 48px; color: var(--text-muted); }
    @media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <header>
    <h1>KirinNet</h1>
    <nav>
      <a href="/">首页</a>
      <a href="/swipe.html">滑动浏览</a>
      <a href="/ingestion.html" class="active">收录记录</a>
    </nav>
  </header>

  <div class="container">
    <!-- Stats -->
    <div class="stats-row" id="stats"></div>

    <!-- Filters -->
    <div class="filter-bar">
      <select id="actionFilter" onchange="loadLog()">
        <option value="">全部操作</option>
        <option value="indexed">已收录</option>
        <option value="updated">已更新</option>
        <option value="de_indexed">已下架</option>
        <option value="re_indexed">已恢复</option>
      </select>
      <input type="text" id="sourceFilter" placeholder="来源节点域名..." onkeydown="if(event.key==='Enter')loadLog()">
      <button onclick="loadLog()">筛选</button>
    </div>

    <!-- Table -->
    <div style="overflow-x: auto;">
      <table class="log-table">
        <thead>
          <tr>
            <th>时间</th>
            <th>操作</th>
            <th>内容</th>
            <th>类型</th>
            <th>来源</th>
            <th>CID</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
    <div id="emptyMsg"></div>
  </div>

  <script>
    const API = '/api/v1';

    async function loadStats() {
      try {
        const res = await fetch(`${API}/ingestion/stats`);
        const data = await res.json();
        const byAction = {};
        (data.by_action || []).forEach(a => { byAction[a.action] = a.count; });

        document.getElementById('stats').innerHTML = `
          <div class="stat-card">
            <div class="value">${data.total_indexed || 0}</div>
            <div class="label">总收录事件</div>
          </div>
          <div class="stat-card">
            <div class="value">${byAction.indexed || 0}</div>
            <div class="label">新收录</div>
          </div>
          <div class="stat-card">
            <div class="value">${byAction.updated || 0}</div>
            <div class="label">更新</div>
          </div>
          <div class="stat-card">
            <div class="value">${byAction.de_indexed || 0}</div>
            <div class="label">下架</div>
          </div>
        `;
      } catch (err) {
        console.error('Stats error:', err);
      }
    }

    async function loadLog() {
      const action = document.getElementById('actionFilter').value;
      const source = document.getElementById('sourceFilter').value.trim();
      const params = new URLSearchParams();
      if (action) params.set('action', action);
      if (source) params.set('source_node', source);
      params.set('limit', '50');

      const tbody = document.getElementById('logBody');
      const empty = document.getElementById('emptyMsg');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:20px;">加载中...</td></tr>';
      empty.innerHTML = '';

      try {
        const res = await fetch(`${API}/ingestion?${params.toString()}`);
        const data = await res.json();

        if (data.events.length === 0) {
          tbody.innerHTML = '';
          empty.innerHTML = '<div class="empty">暂无收录记录</div>';
          return;
        }

        tbody.innerHTML = data.events.map(e => `
          <tr>
            <td>${formatTime(e.created_at)}</td>
            <td><span class="badge ${e.action}">${actionLabel(e.action)}</span></td>
            <td>${esc(e.content_title || '—')}</td>
            <td><span class="badge ${e.content_type || ''}">${esc(e.content_type || '—')}</span></td>
            <td>${esc(e.source_node || '—')}</td>
            <td style="font-family:monospace;font-size:11px;">${esc((e.cid || '').substring(0, 16))}...</td>
          </tr>
        `).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--red);">加载失败: ${err.message}</td></tr>`;
      }
    }

    function actionLabel(a) { return { indexed: '收录', updated: '更新', de_indexed: '下架', re_indexed: '恢复' }[a] || a; }
    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
    function formatTime(t) {
      if (!t) return '';
      const d = new Date(t);
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    loadStats();
    loadLog();
  </script>
</body>
</html>
