version: "3.9"

services:
  platform:
    build: .
    container_name: kirinnet-platform
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/kirinnet_platform.db
      - JWT_SECRET=change-this-in-production
      - KIRINNET_SKIP_SIG_VERIFY=true
