<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初始化 — KirinNet</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:40px; width:100%; max-width:440px; }
h1 { font-size:22px; color:#f0f6fc; margin-bottom:4px; }
.sub { color:#8b949e; font-size:13px; margin-bottom:28px; }
.group { margin-bottom:18px; }
.group label { display:block; font-size:13px; color:#f0f6fc; margin-bottom:4px; }
.group .hint { font-size:11px; color:#8b949e; margin-bottom:6px; }
.group input, .group select { width:100%; padding:10px 12px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; font-size:14px; }
.group input:focus, .group select:focus { outline:none; border-color:#58a6ff; }
.btn { width:100%; padding:12px; border:none; border-radius:6px; background:#238636; color:#fff; font-size:15px; cursor:pointer; transition:.2s; margin-top:8px; }
.btn:hover { background:#2ea043; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.msg { margin-top:12px; font-size:13px; text-align:center; }
.msg.err { color:#f85149; }
.msg.ok { color:#3fb950; }
</style>
</head>
<body>
<div class="card">
  <h1>🦄 初始化 KirinNet 节点</h1>
  <p class="sub">首次运行，请完成基础设置</p>

  <div class="group">
    <label>节点密码 *</label>
    <p class="hint">用于登录本节点管理后台</p>
    <input type="password" id="password" placeholder="至少 6 位" minlength="6">
  </div>

  <div class="group">
    <label>确认密码 *</label>
    <input type="password" id="password2" placeholder="再次输入">
  </div>

  <div class="group" style="background:#1a1f2e;border:1px solid #d2991d;border-radius:8px;padding:14px;margin-top:-4px">
    <p style="color:#d2991d;font-size:13px;margin:0 0 8px 0">⚠️ <b>重要：密码无法找回</b></p>
    <p style="color:#8b949e;font-size:12px;margin:0 0 10px 0">KirinNet 是完全去中心化的，没有「找回密码」功能。请立即用纸和笔记下你的密码，存放在安全处。</p>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#c9d1d9">
      <input type="checkbox" id="wrote_down" style="width:16px;height:16px;accent-color:#d2991d">
      我已用纸笔记下密码
    </label>
  </div>

  <div class="group">
    <label>节点域名</label>
    <p class="hint">你的公开域名，如 kirin.example.com</p>
    <input type="text" id="domain" placeholder="kirin.example.com">
  </div>

  <div class="group">
    <label>DNS 服务商</label>
    <select id="dns_provider">
      <option value="">不使用</option>
      <option value="cloudflare">Cloudflare</option>
      <option value="dnspod">DNSPod (腾讯)</option>
      <option value="aliyun">阿里云 DNS</option>
      <option value="huaweicloud">华为云 DNS</option>
      <option value="aws-route53">AWS Route 53</option>
      <option value="google-domains">Google Domains</option>
      <option value="namecheap">Namecheap</option>
      <option value="godaddy">GoDaddy</option>
      <option value="porkbun">Porkbun</option>
      <option value="namesilo">NameSilo</option>
      <option value="cloudns">ClouDNS</option>
      <option value="he.net">Hurricane Electric</option>
    </select>
  </div>

  <div class="group" id="apikey_group" style="display:none">
    <label>DNS API Key</label>
    <p class="hint">用于自动化 DNS 记录管理</p>
    <input type="password" id="dns_api_key" placeholder="API Token / Secret">
  </div>

  <button class="btn" id="submit" onclick="init()">完成初始化</button>
  <div id="msg" class="msg"></div>
</div>

<script>
document.getElementById('dns_provider').onchange = function() {
  document.getElementById('apikey_group').style.display = this.value ? 'block' : 'none';
};

async function init() {
  const pw = document.getElementById('password').value;
  const pw2 = document.getElementById('password2').value;
  const domain = document.getElementById('domain').value;
  const dns = document.getElementById('dns_provider').value;
  const apikey = document.getElementById('dns_api_key').value;
  const btn = document.getElementById('submit');
  const msg = document.getElementById('msg');

  if (pw.length < 6) { msg.className='msg err'; msg.textContent='密码至少 6 位'; return; }
  if (pw !== pw2) { msg.className='msg err'; msg.textContent='两次密码不一致'; return; }
  if (!document.getElementById('wrote_down').checked) { msg.className='msg err'; msg.textContent='请先确认已用纸笔记下密码'; return; }

  btn.disabled = true; btn.textContent = '初始化中...';
  msg.className = 'msg'; msg.textContent = '';

  try {
    const r = await fetch('/api/init', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password:pw, domain:domain||null, dns_provider:dns||null, dns_api_key:apikey||null })
    });
    const d = await r.json();
    if (d.status === 'ok') {
      msg.className = 'msg ok'; msg.textContent = '✅ 初始化完成！跳转中...';
      const now = Date.now();
      localStorage.setItem('kirin_auth', pw);
      localStorage.setItem('kirin_auth_ts', now);
      setTimeout(() => location.href = '/app', 1500);
    } else {
      msg.className = 'msg err'; msg.textContent = '❌ ' + (d.error || '失败');
      btn.disabled = false; btn.textContent = '完成初始化';
    }
  } catch(e) {
    msg.className = 'msg err'; msg.textContent = '❌ 网络错误';
    btn.disabled = false; btn.textContent = '完成初始化';
  }
}
</script>
</body>
</html>
